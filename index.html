<script>
    const SUPABASE_URL = 'https://qcrafqzgfzuclxnbscod.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFjcmFmcXpnZnp1Y2x4bmJzY29kIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQxMjI0MDMsImV4cCI6MjA4OTY5ODQwM30.CumnYJV3ikO4t79VsSt3Y0Y0qAvMb3RMXJHHUgayGjo';

    let supabaseClient;
    let totalSteps = 0;
    let formConfig = null;
    let pagesData = [];
    let imeLock = false;

    function isKakaoInApp() {
        return /KAKAOTALK/i.test(navigator.userAgent);
    }

    function isAndroidWebView() {
        const ua = navigator.userAgent || '';
        const isAndroid = /Android/i.test(ua);
        const isWv = /\bwv\b/.test(ua) || /Version\/[\d.]+/i.test(ua) || /; wv\)/i.test(ua);
        return isAndroid && isWv;
    }

    function showInAppGuideIfNeeded() {
        if (isKakaoInApp() || isAndroidWebView()) {
            const guide = document.getElementById('inapp-guide');
            if (guide) guide.style.display = 'block';
        }
    }

    function forceFocusField(el) {
        if (!el) return;
        try {
            el.focus({ preventScroll: true });
        } catch (e) {
            el.focus();
        }

        if (el.tagName === 'TEXTAREA') {
            const len = el.value.length;
            try {
                el.setSelectionRange(len, len);
            } catch (e) {}
        }
    }

    function bindTouchFocusHandlers() {
        document.querySelectorAll('.user-textarea').forEach((el) => {
            if (el.dataset.touchBind === 'true') return;
            el.dataset.touchBind = 'true';

            el.addEventListener('touchend', function() {
                forceFocusField(this);
            }, { passive: true });

            el.addEventListener('click', function() {
                forceFocusField(this);
            });

            el.addEventListener('input', function() {
                this.style.height = '58px';
                this.style.height = Math.min(this.scrollHeight, 58) + 'px';
            });
        });
    }

    function stabilizeKoreanInputs() {
        const textInputs = document.querySelectorAll('textarea.user-textarea, input[type="password"]');

        textInputs.forEach((input) => {
            if (input.dataset.bindDone === 'true') return;
            input.dataset.bindDone = 'true';

            input.setAttribute('autocomplete', 'off');
            input.setAttribute('autocapitalize', 'off');
            input.setAttribute('autocorrect', 'off');
            input.setAttribute('spellcheck', 'false');

            input.addEventListener('compositionstart', () => {
                input.dataset.composing = 'true';
                imeLock = true;
            });

            input.addEventListener('compositionend', () => {
                input.dataset.composing = 'false';
                imeLock = false;
            });

            input.addEventListener('blur', () => {
                input.dataset.composing = 'false';
                imeLock = false;
            });
        });
    }

    window.onload = async function() {
        showInAppGuideIfNeeded();

        try {
            supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
            const { data, error } = await supabaseClient.from('form_config').select('config_data').eq('id', 1).single();

            if (error) {
                showError("관리자 페이지에서 먼저<br>[전체 저장하여 배포하기] 버튼을 눌러주세요.");
                return;
            }

            if (data && data.config_data && Object.keys(data.config_data).length > 0) {
                formConfig = data.config_data;
                renderFormFromConfig();
            } else {
                showError("관리자 페이지에서 폼을 먼저 배포해 주세요.");
            }
        } catch (error) {
            showError("시스템 연결이 지연되고 있습니다.<br>잠시 후 새로고침 해주세요.");
        }
    };

    function showError(msg) {
        document.querySelector('.spinner').style.display = 'none';
        document.getElementById('loading-text').innerHTML = `<span style="color:var(--error-color); font-weight:bold; line-height:1.5;">${msg}</span>`;
    }

        function renderFormFromConfig() {
        document.getElementById('loading-screen').style.display = 'none';

        if (formConfig.global.logo && formConfig.global.logo.length > 10) {
            document.getElementById('u-logo-img').src = formConfig.global.logo;
            document.getElementById('u-logo-img').style.display = 'block';
            document.getElementById('u-logo-txt').style.display = 'none';
        }
        document.getElementById('u-logo-sub-txt').innerText = formConfig.global.text || '';

        if (formConfig.pages && formConfig.pages.length > 0) {
            pagesData = formConfig.pages;
        } else if (formConfig.questions && formConfig.questions.length > 0) {
            pagesData = formConfig.questions.map(q => [q]);
        }

        const container = document.getElementById('dynamic-form-container');
        let htmlString = '';
        let stepIndex = 0;

        // 👑 다이렉트 문의 버튼 HTML을 먼저 만듭니다.
        let directBtnHtml = '';
        if (formConfig.finish.showDirectBtn !== false) {
            directBtnHtml = `<button class="btn-primary btn-dark" style="width: 100%; margin-top: 12px;" onclick="openStoreModal()">📞 다이렉트 문의 (매장 연결)</button>`;
        }

        // 👑 메인 커버 페이지 (첫 화면)에 다이렉트 문의 버튼 추가
        const coverImgTag = formConfig.cover.img ? `<img src="${formConfig.cover.img}">` : `<div style="padding:40px;">🎁</div>`;
        htmlString += `
            <div class="page active" id="page-0">
                <div class="cover-image-box" style="${formConfig.cover.img ? '' : 'background:transparent; border:none; box-shadow:none; height:auto; min-height:150px;'}">${coverImgTag}</div>
                <div class="center-text" style="justify-content: flex-start; align-items: flex-start; text-align: left;">
                    <h1 class="user-h1" style="margin-bottom: 6px;">${formConfig.cover.title}</h1>
                    <div class="user-sub" style="margin-bottom:0;">${formConfig.cover.sub}</div>
                </div>
                <div class="footer" style="display:block;">
                    <button class="btn-primary" onclick="goNext(0)" style="width:100%;">혜택 확인하고 참여하기</button>
                    ${directBtnHtml} 
                    <button class="planner-link-btn" onclick="openPlannerLogin()"><span>📋</span> 플래너 전용</button>
                </div>
            </div>`;
        stepIndex++;

        // 질문 페이지
        pagesData.forEach((pageQuestions, pIdx) => {
            htmlString += `<div class="page" id="page-${stepIndex}">
                <div class="error-msg" id="err-${stepIndex}">작성하지 않은 항목이 있습니다. 빠짐없이 체크해 주세요.</div>`;

            pageQuestions.forEach((q, qIdx) => {
                const uniqueName = `q_${pIdx}_${qIdx}`;
                const imgHtml = q.img ? `<div class="question-image-box"><img src="${q.img}"></div>` : ``;
                const subHtml = q.sub && q.sub !== '<br>' ? `<div class="user-sub">${q.sub}</div>` : '';
                let inputHtml = '';

                if (q.type === 'text') {
                    inputHtml = `
                        <div class="input-touch-wrap" onclick="focusTextByName('${uniqueName}')" ontouchend="focusTextByName('${uniqueName}')">
                            <textarea
                                class="user-textarea val-check"
                                name="${uniqueName}"
                                rows="1"
                                inputmode="text"
                                enterkeyhint="done"
                                autocomplete="off"
                                autocapitalize="off"
                                autocorrect="off"
                                spellcheck="false"
                                placeholder="답변을 입력해 주세요."
                            ></textarea>
                        </div>`;
                } else {
                    inputHtml += `<div class="box-btn-group">`;
                    q.options.forEach((opt) => {
                        inputHtml += `<label class="box-btn-label"><input type="${q.type}" name="${uniqueName}" class="val-check" value="${opt}"><div class="box-btn-content">${opt}</div></label>`;
                    });
                    inputHtml += `</div>`;
                }

                htmlString += `
                    <div class="question-block">
                        ${imgHtml}
                        <h1 class="user-h1" style="margin-top:0;">${q.title}</h1>
                        ${subHtml}
                        ${inputHtml}
                    </div>
                `;
            });

            htmlString += `
                <div class="footer" style="display:block;">
                    <div class="footer-flex">
                        <button class="btn-secondary" onclick="goPrev(${stepIndex})">이전</button>
                        <button class="btn-primary" onclick="goNext(${stepIndex})">다음</button>
                    </div>
                </div>
            </div>`;
            stepIndex++;
        });

        // 약관 동의 페이지
        const c = formConfig.consent;
        htmlString += `
            <div class="page" id="page-${stepIndex}">
                <h1 class="user-h1" style="font-size:22px; text-align:center; margin-bottom:20px;">약관 동의</h1>
                <div class="consent-sector">
                    <div class="consent-title">${c.pTitle}</div>
                    <div class="consent-box">${c.pText}</div>
                    <label class="consent-check-label"><input type="checkbox" class="consent-check-input val-check-required"><span class="consent-check-text">[필수] ${c.pLabel}</span></label>
                </div>
                <div class="consent-sector" style="margin-bottom:10px;">
                    <div class="consent-title">${c.mTitle}</div>
                    <div class="consent-box">${c.mText}</div>
                    <label class="consent-check-label"><input type="checkbox" class="consent-check-input val-check-marketing"><span class="consent-check-text">[선택] ${c.mLabel}</span></label>
                </div>
                <div class="error-msg" id="err-${stepIndex}" style="margin-bottom: 20px;">필수 약관에 동의하셔야 제출이 가능합니다.</div>

                <div class="footer" style="display:block;">
                    <div class="footer-flex">
                        <button class="btn-secondary" onclick="goPrev(${stepIndex})">이전</button>
                        <button class="btn-primary" id="submit-btn" onclick="submitToSupabase(${stepIndex})">제출하기</button>
                    </div>
                </div>
            </div>`;
        stepIndex++;

        // 👑 완료 페이지 (여기도 다이렉트 문의 버튼 유지)
        htmlString += `
            <div class="page" id="page-${stepIndex}">
                <div class="center-text">
                    <div style="font-size: 80px; margin-bottom:20px;">🎉</div>
                    <div class="user-h1">${formConfig.finish.msg}</div>
                    <div style="width: 100%; margin-top: 50px;">
                        <button class="btn-secondary" style="width: 100%;" onclick="location.reload();">🏠 처음으로 돌아가기</button>
                        ${directBtnHtml} 
                    </div>
                </div>
            </div>`;

        container.innerHTML = htmlString;
        totalSteps = stepIndex + 1;
        document.getElementById('progressText').innerText = '준비';

        renderStoreListModal();
        stabilizeKoreanInputs();
        bindTouchFocusHandlers();
    }


    function focusTextByName(name) {
        const target = document.querySelector(`textarea[name="${name}"]`);
        forceFocusField(target);
    }

    function renderStoreListModal() {
        const storeContainer = document.getElementById('store-list-render-area');
        if (!formConfig.stores || formConfig.stores.length === 0) {
            storeContainer.innerHTML = `<div style="text-align:center; padding: 40px 0; color:#94a3b8; font-size:15px;">등록된 매장 정보가 없습니다.</div>`;
            return;
        }

        let storeHtml = '';
        formConfig.stores.forEach(store => {
            storeHtml += `
                <div class="store-card">
                    <h3>${store.name}</h3>
                    <p>📍 ${store.address}</p>
                    <a href="tel:${store.phone}" class="store-call-btn">📞 전화 연결 (${store.phone})</a>
                </div>
            `;
        });
        storeContainer.innerHTML = storeHtml;
    }

    function openStoreModal() {
        document.getElementById('store-modal').style.display = 'flex';
    }

    function closeStoreModal() {
        document.getElementById('store-modal').style.display = 'none';
    }

    function goNext(currentStep) {
        if (imeLock) return;

        const page = document.getElementById('page-' + currentStep);
        const errorMsg = page.querySelector('.error-msg');
        if (errorMsg) errorMsg.style.display = 'none';

        let isValid = true;

        const textInputs = page.querySelectorAll('textarea.val-check');
        textInputs.forEach(t => {
            if (t.value.trim() === '') {
                t.style.borderColor = 'var(--error-color)';
                isValid = false;
            } else {
                t.style.borderColor = 'var(--border-color)';
            }
        });

        const radioGroups = [...new Set([...page.querySelectorAll('input[type="radio"].val-check')].map(r => r.name))];
        radioGroups.forEach(name => {
            const isChecked = page.querySelector(`input[type="radio"][name="${name}"]:checked`);
            if (!isChecked) isValid = false;
        });

        const checkGroups = [...new Set([...page.querySelectorAll('input[type="checkbox"].val-check')].map(c => c.name))];
        checkGroups.forEach(name => {
            const isChecked = page.querySelector(`input[type="checkbox"][name="${name}"]:checked`);
            if (!isChecked) isValid = false;
        });

        if (!isValid && errorMsg) {
            errorMsg.style.display = 'block';
            window.scrollTo(0, 0);
            return;
        }

        movePage(currentStep + 1);
    }

    async function submitToSupabase(consentStep) {
        if (imeLock) return;

        const page = document.getElementById('page-' + consentStep);
        const errorMsg = page.querySelector('.error-msg');
        if (errorMsg) errorMsg.style.display = 'none';

        const requiredConsents = page.querySelectorAll('.consent-check-input.val-check-required');
        if (requiredConsents.length > 0 && !Array.from(requiredConsents).some(c => c.checked)) {
            errorMsg.style.display = 'block';
            window.scrollTo(0, 0);
            return;
        }

        let collectedAnswers = [];
        document.querySelectorAll('.val-check').forEach(input => {
            if (input.tagName === 'TEXTAREA') {
                collectedAnswers.push(input.value);
            } else if (input.type === 'radio' && input.checked) {
                collectedAnswers.push(input.value);
            } else if (input.type === 'checkbox' && input.checked) {
                collectedAnswers.push(`[다중] ${input.value}`);
            }
        });

        const submitBtn = document.getElementById('submit-btn');
        submitBtn.innerText = "제출 중...";
        submitBtn.disabled = true;

        try {
            const { error } = await supabaseClient.from('submissions').insert([{ content: collectedAnswers.join(' / ') }]);
            if (error) throw error;
            movePage(consentStep + 1);
        } catch (error) {
            alert('데이터 저장 중 문제가 발생했습니다. 잠시 후 다시 시도해 주세요.');
            submitBtn.innerText = "제출하기";
            submitBtn.disabled = false;
        }
    }

    function goPrev(currentStep) {
        if (imeLock) return;
        movePage(currentStep - 1);
    }

    function movePage(targetStep) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        const targetPage = document.getElementById('page-' + targetStep);

        if (targetPage) {
            targetPage.classList.add('active');
            window.scrollTo(0, 0);

            const pBar = document.getElementById('progressBar');
            const pText = document.getElementById('progressText');

            if (targetStep === 0) {
                pBar.style.width = '0%';
                pText.innerText = '준비';
                pText.style.color = 'var(--text-sub)';
            } else if (targetStep === totalSteps - 1) {
                pBar.style.width = '100%';
                pText.innerText = '완료!';
                pText.style.color = 'var(--primary)';
            } else if (targetStep === totalSteps - 2) {
                pBar.style.width = '100%';
                pText.innerText = '약관동의';
                pText.style.color = 'var(--primary)';
            } else {
                const totalQPages = pagesData.length;
                const progressPercentage = (targetStep / totalQPages) * 100;
                pBar.style.width = progressPercentage + '%';
                pText.innerText = `${targetStep} / ${totalQPages}`;
                pText.style.color = 'var(--primary)';
            }

            stabilizeKoreanInputs();
            bindTouchFocusHandlers();
        }
    }

    function openPlannerLogin() {
        document.getElementById('planner-login').style.display = 'flex';
        document.getElementById('planner-pw').value = '';
        setTimeout(() => {
            const pwInput = document.getElementById('planner-pw');
            try {
                pwInput.focus({ preventScroll: true });
            } catch (e) {
                pwInput.focus();
            }
        }, 200);
    }

    function closePlannerLogin() {
        document.getElementById('planner-login').style.display = 'none';
    }

    function checkPlannerPw() {
        if (imeLock) return;

        const pw = document.getElementById('planner-pw').value;
        if (pw === '2012') {
            document.getElementById('planner-login').style.display = 'none';
            document.getElementById('planner-view').style.display = 'flex';
            fetchPlannerDB();
        } else {
            alert('암호가 올바르지 않습니다.');
            document.getElementById('planner-pw').value = '';
        }
    }

    function closePlannerView() {
        document.getElementById('planner-view').style.display = 'none';
    }

    async function fetchPlannerDB() {
        const container = document.getElementById('planner-db-list');
        container.innerHTML = '<div style="text-align:center; padding:50px 0; color:#999; font-size:14px;">데이터를 실시간으로 불러오는 중...</div>';

        try {
            const { data, error } = await supabaseClient.from('submissions').select('*').order('id', { ascending: false });
            if (error) throw error;

            container.innerHTML = '';
            if (!data || data.length === 0) {
                container.innerHTML = '<div style="text-align:center; padding:50px 0; color:#999; font-size:14px;">아직 접수된 내역이 없습니다.</div>';
                return;
            }

            data.forEach(item => {
                const d = new Date(item.created_at);
                const dateStr = `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
                const remarkHtml = item.remark ? `<div class="db-remark">💡 비고: ${item.remark}</div>` : '';
                const card = document.createElement('div');
                card.className = 'db-card';
                card.innerHTML = `
                    <div class="db-card-header">
                        <span style="font-weight:700; color:var(--primary);">No. ${item.id}</span>
                        <span>${dateStr}</span>
                    </div>
                    <div class="db-card-content">${item.content}</div>
                    ${remarkHtml}
                `;
                container.appendChild(card);
            });
        } catch (error) {
            container.innerHTML = '<div style="text-align:center; padding:50px 0; color:var(--error-color); font-size:14px;">데이터를 불러오는 데 실패했습니다.</div>';
        }
    }
</script>
</body>
</html>
