    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFjcmFmcXpnZnp1Y2x4bmJzY29kIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQxMjI0MDMsImV4cCI6MjA4OTY5ODQwM30.CumnYJV3ikO4t79VsSt3Y0Y0qAvMb3RMXJHHUgayGjo';
    
    let supabaseClient;
    let pageCount = 0; 
    let qCount = 0; 
    let storesList = []; 

    // 로그인 확인 기능
    function checkPassword() {
        const pwInput = document.getElementById('admin-pw');
        if (pwInput.value === 'ureem2012') {
            document.getElementById('login-view').style.display = 'none';
            document.getElementById('admin-view').style.display = 'flex';
            initAdmin(); 
        } else {
            alert('비밀번호가 일치하지 않습니다.');
            pwInput.value = '';
            pwInput.focus();
        }

    async function initAdmin() {
        initDefaultQuestions(); 
        renderStores(); 

        try {
            supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
            await loadConfigFromSupabase(); 
        } catch (error) {
            document.getElementById('db-status').innerText = "❌ 첫 접속입니다. 우측 하단의 [저장]을 눌러주세요.";
            document.getElementById('db-status').style.color = "#ea580c";
        }
    }

    function switchAdminTab(tabId, element) {
        document.querySelectorAll('.admin-section').forEach(el => el.classList.remove('active'));
        document.querySelectorAll('.admin-nav-item').forEach(el => el.classList.remove('active'));
        
        document.getElementById(tabId).classList.add('active');
        if(element) element.classList.add('active');

        if(tabId === 'editor') document.getElementById('header-title').innerText = "세부 질문 폼 빌더";
        else if(tabId === 'global') document.getElementById('header-title').innerText = "글로벌 환경 설정";
        else if(tabId === 'store') document.getElementById('header-title').innerText = "다이렉트 매장 관리";
        else if(tabId === 'db') { 
            document.getElementById('header-title').innerText = "신청자 DB 관리"; 
            if(typeof fetchDBFromSupabase === 'function' && supabaseClient) fetchDBFromSupabase(); 
        }
    }

    function initDefaultQuestions() {
        document.getElementById('builder-container').innerHTML = '';
        pageCount = 0; qCount = 0;
        
        let p1 = addPageBox();
        addQuestionBox(p1, 'text', '', '<b>이름</b>을 입력해 주세요.', '정확한 본인 확인을 위해 필수입니다.', '');
        addQuestionBox(p1, 'text', '', '<b>연락처</b>를 입력해 주세요.', '사은품 수령 안내 목적으로만 사용됩니다.', '');
        
        let p2 = addPageBox();
        addQuestionBox(p2, 'text', '', '현재 사용 중이신 <b>휴대폰 기종</b>이 무엇인가요?', '기종에 딱 맞는 케이스/필름을 준비할게요.', '');
        addQuestionBox(p2, 'radio', '', '<b>충전 포트 타입</b>을 선택해 주세요.', '선택 시 자동으로 다음으로 넘어갑니다.', 'C타입, 8핀 라이트닝, 기타/모름');
        
        let p3 = addPageBox();
        addQuestionBox(p3, 'radio', '', '현재 이용 중이신 <b>통신사</b>를 알려주세요.', '더 나은 맞춤형 혜택을 비교해 드립니다.', 'LG U+, 타사 (SKT / KT / 알뜰폰)');
        addQuestionBox(p3, 'checkbox', '', '가장 관심 있는 <b>혜택</b>은 무엇인가요?', '중복 선택이 가능합니다. 원하시는 혜택을 모두 골라주세요.', '최신 스마트폰 변경 혜택, 요금 절감 컨설팅, 사은품 수령');
    }

    function addPageBox() {
        pageCount++;
        const container = document.getElementById('builder-container');
        const pageItem = document.createElement('div');
        pageItem.className = 'page-builder-item';
        pageItem.innerHTML = `
            <div class="page-header">
                <span class="page-title-label">📄 폼 화면 페이지 ${pageCount}</span>
                <button class="btn-delete" style="padding: 8px 16px; background:#fee2e2; border:1px solid #fca5a5;" onclick="if(confirm('이 페이지와 포함된 질문을 삭제하시겠습니까?')) { this.parentElement.parentElement.remove(); updatePageNumbers(); }">🗑️ 전체 페이지 삭제</button>
            </div>
            <div class="page-questions-container"></div>
            <div style="text-align: center; margin-top: 15px;">
                <button class="btn-add-q-to-page" onclick="addQuestionToPage(this)">+ 이 페이지에 질문 추가 (현재 구성중)</button>
            </div>
        `;
        container.appendChild(pageItem);
        updatePageNumbers();
        return pageItem.querySelector('.page-questions-container');
    }

    function updatePageNumbers() {
        const pages = document.querySelectorAll('.page-builder-item');
        pages.forEach((page, index) => {
            page.querySelector('.page-title-label').innerText = `📄 폼 화면 페이지 ${index + 1}`;
        });
        pageCount = pages.length;
    }

    function addQuestionToPage(btn) {
        const qContainer = btn.parentElement.previousElementSibling;
        const currentQs = qContainer.querySelectorAll('.q-item').length;
        if(currentQs >= 2) {
            alert('💡 한 페이지당 질문은 최대 2개까지만 등록할 수 있습니다.\n새로운 질문은 [새 페이지 추가] 버튼을 눌러 추가해주세요.');
            return;
        }
        addQuestionBox(qContainer, 'radio', '', '새 질문 제목', '부가설명을 입력하세요.', '옵션1, 옵션2');
    }

    function addQuestionBox(container, type='radio', imgSrc='', title='새 질문 제목', sub='부가설명을 입력하세요.', options='옵션1, 옵션2') {
        const currentQs = container.querySelectorAll('.q-item').length;
        const isSecondQuestion = currentQs >= 1; 

        qCount++;
        const newItem = document.createElement('div');
        newItem.className = 'builder-item q-item';
        const imgId = 'set-q' + qCount + '-img';
        
        let selText = type === 'text' ? 'selected' : ''; 
        let selRadio = type === 'radio' ? 'selected' : ''; 
        let selCheck = type === 'checkbox' ? 'selected' : ''; 
        let optDisplay = type === 'text' ? 'none' : 'block';
        
        let imageUploadHtml = '';
        if (!isSecondQuestion) {
            imageUploadHtml = `
            <div class="admin-form-group">
                <div class="file-upload-box" style="padding:10px;">
                    <input type="file" class="file-upload-input" accept="image/*" onchange="previewImage(this, '${imgId}')">
                    <span style="font-size:13px; color:#64748b;">사진 첨부 (선택)</span>
                    <img id="${imgId}" class="img-preview q-img" src="${imgSrc}" style="${imgSrc ? 'display:block;' : 'display:none;'}">
                </div>
            </div>`;
        }
        
        newItem.innerHTML = `
            <div class="builder-item-header"><span>📝 개별 질문 세팅</span><button class="btn-delete" onclick="this.parentElement.parentElement.remove()">🗑️ 개별 삭제</button></div>
            <div class="admin-form-group"><select class="admin-input q-type" onchange="toggleOptions(this)"><option value="text" ${selText}>주관식</option><option value="radio" ${selRadio}>객관식 (단일선택)</option><option value="checkbox" ${selCheck}>객관식 (다중선택)</option></select></div>
            ${imageUploadHtml}
            <div class="admin-form-group"><label class="admin-label">질문 큰제목</label><div class="editor-toolbar"><button onclick="document.execCommand('bold', false, null)"><b>B</b></button><input type="color" onchange="document.execCommand('foreColor', false, this.value)"><select onchange="document.execCommand('fontSize', false, this.value)"><option value="3">기본크기</option><option value="4">조금 크게</option><option value="5">크게</option></select></div><div class="rich-editor q-title" contenteditable="true">${title}</div></div>
            <div class="admin-form-group"><label class="admin-label">작은제목 / 부가설명</label><div class="editor-toolbar"><button onclick="document.execCommand('bold', false, null)"><b>B</b></button><input type="color" onchange="document.execCommand('foreColor', false, this.value)" value="#6b7280"><select onchange="document.execCommand('fontSize', false, this.value)"><option value="2">작게</option><option value="3" selected>기본크기</option><option value="4">조금 크게</option></select></div><div class="rich-editor q-sub" contenteditable="true">${sub}</div></div>
            <div class="admin-form-group options-group" style="display:${optDisplay};"><label class="admin-label">선택지 콤마(,) 구분</label><input type="text" class="admin-input q-options" value="${options}"></div>
        `;
        container.appendChild(newItem);
    }

    function addStore() {
        const name = document.getElementById('new-store-name').value.trim();
        const address = document.getElementById('new-store-address').value.trim();
        const phone = document.getElementById('new-store-phone').value.trim();

        if (!name || !phone) {
            alert('매장명과 연락처는 필수로 입력해주세요.');
            return;
        }

        storesList.push({ name, address, phone });
        document.getElementById('new-store-name').value = '';
        document.getElementById('new-store-address').value = '';
        document.getElementById('new-store-phone').value = '';
        renderStores();
    }

    function renderStores() {
        const tbody = document.getElementById('store-tbody');
        tbody.innerHTML = '';
        if (storesList.length === 0) {
            tbody.innerHTML = '<tr><td colspan="4" style="text-align:center; padding:30px;">등록된 매장이 없습니다. 상단에서 매장을 추가해주세요.</td></tr>';
            return;
        }
        storesList.forEach((store, index) => {
            const tr = document.createElement('tr');
            tr.innerHTML = `
                <td style="font-weight:600;">${store.name}</td>
                <td>${store.address}</td>
                <td><a href="tel:${store.phone}" style="color:var(--primary); text-decoration:none; font-weight:600;">📞 ${store.phone}</a></td>
                <td><button class="btn-delete-db" onclick="deleteStore(${index})">삭제</button></td>
            `;
            tbody.appendChild(tr);
        });
    }

    function deleteStore(index) {
        if(confirm("해당 매장을 리스트에서 삭제하시겠습니까?")) {
            storesList.splice(index, 1);
            renderStores();
        }
    }

    async function loadConfigFromSupabase() {
        const { data, error } = await supabaseClient.from('form_config').select('config_data').eq('id', 1).single();
        if (error) throw error; 

        if (data && data.config_data && Object.keys(data.config_data).length > 0) {
            const config = data.config_data;
            if(config.global.logo) { document.getElementById('set-logo-img').src = config.global.logo; document.getElementById('set-logo-img').style.display = 'block'; }
            document.getElementById('set-logo-sub-txt').value = config.global.text;
            if(config.cover.img) { document.getElementById('set-cover-img').src = config.cover.img; document.getElementById('set-cover-img').style.display = 'block'; }
            document.getElementById('set-cover-title').innerHTML = config.cover.title;
            document.getElementById('set-cover-sub').innerHTML = config.cover.sub;
            
            document.getElementById('set-privacy-title').value = config.consent.pTitle;
            document.getElementById('set-privacy-text').value = config.consent.pText;
            document.getElementById('set-privacy-label').value = config.consent.pLabel;
            document.getElementById('set-marketing-title').value = config.consent.mTitle;
            document.getElementById('set-marketing-text').value = config.consent.mText;
            document.getElementById('set-marketing-label').value = config.consent.mLabel;
            
            document.getElementById('set-finish-msg').innerHTML = config.finish.msg;
            if(config.finish.showDirectBtn !== undefined) document.getElementById('set-show-direct').checked = config.finish.showDirectBtn;
            if(config.stores) { storesList = config.stores; renderStores(); }
            
            document.getElementById('builder-container').innerHTML = '';
            pageCount = 0;
            
            if (config.pages && config.pages.length > 0) {
                config.pages.forEach(pageQs => {
                    const pageContainer = addPageBox();
                    pageQs.forEach(q => {
                        addQuestionBox(pageContainer, q.type, q.img, q.title, q.sub, q.options.join(', '));
                    });
                });
            } else if (config.questions && config.questions.length > 0) {
                let currentPage;
                config.questions.forEach((q, index) => {
                    if (index % 2 === 0) currentPage = addPageBox();
                    addQuestionBox(currentPage, q.type, q.img, q.title, q.sub, q.options.join(', '));
                });
            }
            
            document.getElementById('db-status').innerText = "✅ DB 연동 완료";
            document.getElementById('db-status').style.color = "#059669";
        }
    }

    async function saveConfigToSupabase() {
        const btn = document.getElementById('btn-save');
        btn.innerText = "저장 및 배포 중..."; btn.disabled = true;

        let configData = {
            global: { logo: document.getElementById('set-logo-img').src, text: document.getElementById('set-logo-sub-txt').value },
            cover: { img: document.getElementById('set-cover-img').src, title: document.getElementById('set-cover-title').innerHTML, sub: document.getElementById('set-cover-sub').innerHTML },
            pages: [], 
            consent: {
                pTitle: document.getElementById('set-privacy-title').value, pText: document.getElementById('set-privacy-text').value, pLabel: document.getElementById('set-privacy-label').value,
                mTitle: document.getElementById('set-marketing-title').value, mText: document.getElementById('set-marketing-text').value, mLabel: document.getElementById('set-marketing-label').value
            },
            finish: { 
                msg: document.getElementById('set-finish-msg').innerHTML,
                showDirectBtn: document.getElementById('set-show-direct').checked 
            },
            stores: storesList 
        };

        document.querySelectorAll('.page-builder-item').forEach(pageItem => {
            let pageQuestions = [];
            pageItem.querySelectorAll('.q-item').forEach(item => {
                const qImgEl = item.querySelector('.q-img');
                const imgVal = (qImgEl && qImgEl.getAttribute('src')) ? qImgEl.src : '';
                
                pageQuestions.push({
                    type: item.querySelector('.q-type').value, 
                    img: imgVal,
                    title: item.querySelector('.q-title').innerHTML, 
                    sub: item.querySelector('.q-sub').innerHTML,
                    options: item.querySelector('.q-options').value.split(',').map(s => s.trim()).filter(s => s)
                });
            });
            configData.pages.push(pageQuestions);
        });

        try {
            const { error } = await supabaseClient.from('form_config').upsert({ id: 1, config_data: configData });
            if (error) throw error;
            
            alert('성공적으로 배포되었습니다!\n고객들이 접속 시 최신 페이지 구성이 적용됩니다.');
            document.getElementById('db-status').innerText = "✅ DB 연동 완료";
            document.getElementById('db-status').style.color = "#059669";
        } catch (error) {
            console.error("Save Error:", error);
            alert('저장에 실패했습니다. 사진 용량이 너무 크거나 DB 연결이 끊어졌을 수 있습니다.');
        } finally {
            btn.innerText = "💾 전체 저장하여 배포하기"; btn.disabled = false;
        }
    }

    async function fetchDBFromSupabase() {
        const tbody = document.getElementById('db-tbody');
        tbody.innerHTML = '<tr><td colspan="4" style="text-align:center; padding:30px;">데이터를 불러오는 중...</td></tr>';
        
        try {
            const { data, error } = await supabaseClient.from('submissions').select('*').order('id', { ascending: false });
            if (error) throw error;
            
            tbody.innerHTML = '';
            if(!data || data.length === 0) {
                tbody.innerHTML = '<tr><td colspan="4" style="text-align:center; padding:30px;">아직 접수된 데이터가 없습니다.</td></tr>';
                return;
            }

            data.forEach(item => {
                const d = new Date(item.created_at);
                const dateStr = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
                
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td>${item.id}<br><span style="font-size:11px; color:#999;">${dateStr}</span></td>
                    <td style="font-weight:600;">${item.content}</td>
                    <td><input type="text" class="remark-input" placeholder="메모 입력 후 엔터" value="${item.remark || ''}" onchange="updateRemarkToSupabase(${item.id}, this.value)"></td>
                    <td><button class="btn-delete-db" onclick="deleteDBRowFromSupabase(${item.id})">삭제</button></td>
                `;
                tbody.appendChild(tr);
            });
        } catch (error) {
            tbody.innerHTML = '<tr><td colspan="4" style="text-align:center; padding:30px; color:red;">DB를 불러오지 못했습니다.</td></tr>';
        }
    }

    async function updateRemarkToSupabase(id, value) {
        try {
            const { error } = await supabaseClient.from('submissions').update({ remark: value }).eq('id', id);
            if (error) throw error;
        } catch (error) {
            alert('메모 저장에 실패했습니다.');
        }
    }

    async function deleteDBRowFromSupabase(id) {
        if(confirm("이 접수 내역을 정말 영구 삭제하시겠습니까?")) {
            try {
                const { error } = await supabaseClient.from('submissions').delete().eq('id', id);
                if (error) throw error;
                fetchDBFromSupabase();
            } catch (error) {
                alert('데이터 삭제에 실패했습니다.');
            }
        }
    }

    // 👑 사진 자동 압축(리사이징) 기능 추가 👑
    function previewImage(inputElement, previewId) {
        if (inputElement.files && inputElement.files[0]) {
            var reader = new FileReader();
            reader.onload = function(e) {
                // 원본 사진 불러오기
                var img = new Image();
                img.onload = function() {
                    // 압축을 위한 도화지(캔버스) 생성
                    var canvas = document.createElement('canvas');
                    var ctx = canvas.getContext('2d');
                    
                    // 최대 가로 길이를 800px로 제한 (고화질 유지하면서 용량 대폭 감소)
                    var maxWidth = 800;
                    var scaleSize = maxWidth / img.width;
                    
                    if (img.width > maxWidth) {
                        canvas.width = maxWidth;
                        canvas.height = img.height * scaleSize;
                    } else {
                        canvas.width = img.width;
                        canvas.height = img.height;
                    }
                    
                    // 캔버스에 줄어든 크기로 다시 그리기
                    ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                    
                    // 화질 70% 수준으로 압축하여 데이터 생성
                    var compressedDataUrl = canvas.toDataURL('image/jpeg', 0.7);
                    
                    // 화면에 표시 및 저장용 데이터로 세팅
                    const imgElement = document.getElementById(previewId);
                    imgElement.src = compressedDataUrl;
                    imgElement.style.display = 'block';
                };
                img.src = e.target.result;
            }
            reader.readAsDataURL(inputElement.files[0]);
        }
    }

    function toggleOptions(selectElement) {
        const optionsGroup = selectElement.parentElement.parentElement.querySelector('.options-group');
        if (selectElement.value === 'radio' || selectElement.value === 'checkbox') {
            optionsGroup.style.display = 'block';
        } else {
            optionsGroup.style.display = 'none';
        }
    }
</script>
